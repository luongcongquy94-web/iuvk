<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinh Phục Đỉnh Núi Tình Yêu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fff5f7; overflow-x: hidden; }
        
        /* Hiệu ứng Glow cho nút */
        .glow-button:active { box-shadow: 0 0 15px #ff4d94; transform: scale(0.98); }
        
        /* Hiệu ứng Shimmer lấp lánh */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Hiệu ứng Flash */
        .flash-correct { animation: flash-green 0.5s; }
        .flash-wrong { animation: flash-red 0.5s; }
        @keyframes flash-green { 0%, 100% { background: #fff5f7; } 50% { background: #d1fae5; } }
        @keyframes flash-red { 0%, 100% { background: #fff5f7; } 50% { background: #fee2e2; } }

        .hidden { display: none; }
        .progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="fixed top-0 left-0 w-full h-3 bg-pink-100">
        <div id="progress" class="progress-bar h-full bg-pink-500 w-0 relative">
            <span class="absolute right-0 -top-6 text-xl">🏃‍♂️</span>
        </div>
    </div>

    <div id="game-card" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border-4 border-pink-200">
        <div id="content">
            </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Câu 1: Sự kiện lịch sử nào chứng minh sự bắt đầu của một tình iu?",
                options: ["Từ khi ra đời", "0h31p", "20/4", "2022"],
                correct: [1, 2, 3], // B, C, D
                type: "multiple",
                sticker: "https://i.ibb.co/Lz0Y8S6/z7745611563627-eb793e65bf872944b46ed9409163c37e.jpg" 
            },
            {
                question: "Câu 2: Chu thíc anh ở điểm nào?",
                options: ["ảnh làm sứn", "iu chu", "iu tnhu", "tui ngầu mà"],
                correct: [0, 1, 2, 3], // ALL
                type: "multiple",
                sticker: "https://i.ibb.co/vYm6z20/z7745611573649-906cc26493c7e702590239c7dfd6a53f.jpg"
            },
            {
                question: "Câu 3: Hôm nay kỉ niệm bao nhiu năm?",
                info: "Gợi ý: L = lim(x->0) (√(1+8x)-1)/x",
                options: ["20 năm", "12 năm", "4 năm 9 tháng"],
                correct: [2],
                type: "single",
                sticker: "https://i.ibb.co/p0XyZ1W/z7745611578190-516bc663e6b2354f8a88f2ef86d9ca49.jpg"
            },
            {
                question: "Câu 4: Điều chu mong muốn là j?",
                options: ["Dẫn đi chơi", "Nắc vs a", "Có xiền", "Hun a", "Tất cả luôn"],
                correct: [4],
                type: "single",
                sticker: "https://i.ibb.co/9VzR6YQ/z7745611556499-990d87956a5e85fd6d2a056f54b07baf.jpg"
            },
            {
                question: "Câu 5: KHU VỰC TRÁI TIM",
                desc: "Hãy viết lời chu mún nói với thk ck (giới hạn 200 chữ)",
                type: "essay",
                sticker: "https://i.ibb.co/m0f2p8Y/z7745611541768-0383dfec4409e3b0027d60600d52954e.jpg"
            }
        ];

        let currentStep = 0;
        const gameCard = document.getElementById('game-card');
        const content = document.getElementById('content');
        const progress = document.getElementById('progress');

        function render() {
            const data = quizData[currentStep];
            progress.style.width = `${((currentStep) / 5) * 100}%`;

            if (currentStep >= quizData.length) {
                showFinal();
                return;
            }

            let html = `
                <img src="${data.sticker}" class="w-32 h-32 mx-auto mb-4 rounded-full border-4 border-pink-100 shadow-lg animate-bounce">
                <h2 class="text-xl font-bold text-pink-600 mb-2">${data.question}</h2>
                ${data.info ? `<p class="text-xs text-gray-400 mb-4">${data.info}</p>` : ''}
                ${data.desc ? `<p class="text-sm text-pink-400 mb-4 italic">${data.desc}</p>` : ''}
                <div class="space-y-3">
            `;

            if (data.type === 'essay') {
                html += `
                    <textarea id="essay" maxlength="200" class="w-full border-2 border-pink-200 rounded-xl p-3 focus:outline-pink-400" rows="4" placeholder="Nhập lời yêu thương..."></textarea>
                    <button onclick="checkAnswer()" class="shimmer w-full bg-pink-500 text-white font-bold py-3 rounded-full glow-button">Gửi cho anh</button>
                `;
            } else {
                data.options.forEach((opt, idx) => {
                    html += `
                        <button onclick="selectOption(this, ${idx})" class="opt-btn w-full py-3 px-4 border-2 border-pink-100 rounded-2xl hover:bg-pink-50 transition-all font-semibold text-gray-700 relative overflow-hidden">
                            ${opt}
                        </button>
                    `;
                });
                html += `<button onclick="checkAnswer()" class="mt-6 w-full bg-pink-500 text-white font-bold py-3 rounded-full glow-button">Kiểm tra</button>`;
            }

            html += `</div>`;
            content.innerHTML = html;
        }

        let selected = [];
        function selectOption(btn, idx) {
            const data = quizData[currentStep];
            if (data.type === 'single') {
                document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('bg-pink-200', 'border-pink-500'));
                selected = [idx];
                btn.classList.add('bg-pink-200', 'border-pink-500');
            } else {
                if (selected.includes(idx)) {
                    selected = selected.filter(i => i !== idx);
                    btn.classList.remove('bg-pink-200', 'border-pink-500');
                } else {
                    selected.push(idx);
                    btn.classList.add('bg-pink-200', 'border-pink-500');
                }
            }
        }

        function checkAnswer() {
            const data = quizData[currentStep];
            let isCorrect = false;

            if (data.type === 'essay') {
                isCorrect = document.getElementById('essay').value.length > 0;
            } else {
                isCorrect = selected.length === data.correct.length && selected.every(val => data.correct.includes(val));
            }

            if (isCorrect) {
                document.body.classList.add('flash-correct');
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ff69b4', '#ff1493', '#ffffff'] });
                alert("Bé iu dỏi quá ❤️");
                setTimeout(() => {
                    document.body.classList.remove('flash-correct');
                    currentStep++;
                    selected = [];
                    render();
                }, 500);
            } else {
                document.body.classList.add('flash-wrong');
                alert("Tiếp tục nào cục cưng! Gần đúng rùi...");
                setTimeout(() => document.body.classList.remove('flash-wrong'), 500);
            }
        }

        function showFinal() {
            progress.style.width = '100%';
            content.innerHTML = `
                <img src="https://i.ibb.co/1qzXfM2/z7745611582819-3e0e40c935fc8e674ae5d98fb5045bc0.jpg" class="w-48 h-48 mx-auto mb-6 rounded-2xl shadow-2xl animate-pulse">
                <h1 class="text-2xl font-bold text-pink-600 mb-4">🏆 LEO NÚI THÀNH CÔNG!</h1>
                <p class="text-lg text-gray-700 leading-relaxed font-semibold">
                    Chúc mừng cục dàng đã leo núi thành công, <br>
                    <span class="text-pink-500 underline text-2xl">giờ tới anh sẽ leo núi của e</span> 😈
                </p>
                <div class="mt-8 text-pink-300 text-3xl animate-bounce">❤️❤️❤️</div>
            `;
            setInterval(() => {
                confetti({ particleCount: 50, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 50, angle: 120, spread: 55, origin: { x: 1 } });
            }, 2000);
        }

        render();
    </script>
</body>
</html>